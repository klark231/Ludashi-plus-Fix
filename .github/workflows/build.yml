name: Build Ludashi-plus APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install apktool 2.9.3
        run: |
          mkdir -p $HOME/bin
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar" \
            -O $HOME/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" \
            -O $HOME/bin/apktool
          chmod +x $HOME/bin/apktool
          echo "$HOME/bin" >> $GITHUB_PATH
          java -jar $HOME/bin/apktool.jar --version

      - name: Download base Ludashi APK (Winlator-Ludashi v3.0 bionic)
        run: |
          gh release download base-apk-3.0 \
            --pattern "ludashi-bionic.apk" \
            -D base/ \
            -R The412Banner/Ludashi-plus
          ls -lh base/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect Kotlin version in base APK and install matching kotlinc
        run: |
          BASE_APK=$(ls base/*.apk | head -1)
          # Extract classes.dex and look for kotlin-stdlib version string
          mkdir -p kotlin_detect
          unzip -q "$BASE_APK" "classes.dex" -d kotlin_detect/ 2>/dev/null || true
          # Try to find kotlin version from META-INF in the APK zip entries
          KT_VERSION=$(unzip -p "$BASE_APK" "META-INF/kotlin-stdlib.kotlin_module" 2>/dev/null \
            | strings | grep -oP '\d+\.\d+\.\d+' | head -1 || echo "")
          if [ -z "$KT_VERSION" ]; then
            # Fallback: look for version string in all META-INF entries
            KT_VERSION=$(unzip -l "$BASE_APK" | grep -oP 'kotlin-stdlib-\K[\d.]+' | head -1 || echo "")
          fi
          if [ -z "$KT_VERSION" ]; then
            # Safe fallback — use 1.9.24 (widely compatible, works with most coroutines in APKs from 2024)
            KT_VERSION="1.9.24"
            echo "Could not detect Kotlin version — defaulting to $KT_VERSION"
          else
            echo "Detected Kotlin version: $KT_VERSION"
          fi
          echo "KT_VERSION=$KT_VERSION" >> $GITHUB_ENV

          # Download kotlinc matching detected version
          KT_MAJOR_MINOR=$(echo "$KT_VERSION" | cut -d. -f1-2)
          KOTLINC_URL="https://github.com/JetBrains/kotlin/releases/download/v${KT_VERSION}/kotlin-compiler-${KT_VERSION}.zip"
          echo "Downloading: $KOTLINC_URL"
          wget -q "$KOTLINC_URL" -O kotlinc.zip || {
            # If exact version not found, try latest 1.9.x
            FALLBACK="1.9.24"
            echo "Exact version not found, falling back to $FALLBACK"
            wget -q "https://github.com/JetBrains/kotlin/releases/download/v${FALLBACK}/kotlin-compiler-${FALLBACK}.zip" \
              -O kotlinc.zip
          }
          unzip -q kotlinc.zip -d $HOME/
          echo "$HOME/kotlinc/bin" >> $GITHUB_PATH
          kotlinc -version

      - name: Build JavaSteam from source
        run: |
          # Clone and build JavaSteam.
          # JavaSteam is a multi-module Gradle project; we must find the submodule JAR
          # that contains the main library classes (SteamClient, EResult, etc.).
          git clone --depth 1 -b gamenative-latest https://github.com/joshuatam/JavaSteam javasteam_src
          cd javasteam_src

          echo "=== Project structure ==="
          ls -1
          cat settings.gradle 2>/dev/null || cat settings.gradle.kts 2>/dev/null || true

          # Patch HardwareUtils.java: SystemUtils.IS_OS_ANDROID does not exist in
          # commons-lang3 3.14.0 (field was added in a later release). Replace with
          # false so the Android branch is skipped; HardwareUtils falls through to
          # the standard platform detection. No behaviour change on Android — the
          # machine name returned will be the hostname, which is fine for Steam auth.
          HW_FILE=$(find . -name "HardwareUtils.java" 2>/dev/null | head -1)
          if [ -n "$HW_FILE" ]; then
            sed -i 's/SystemUtils\.IS_OS_ANDROID/false/g' "$HW_FILE"
            echo "Patched $HW_FILE: replaced SystemUtils.IS_OS_ANDROID with false"
          else
            echo "WARNING: HardwareUtils.java not found — skipping patch"
          fi

          # Patch Utils.java: the base APK bundles an older commons-lang3 that does
          # NOT have IS_OS_MAC_OSX_SONOMA (added in 3.14.0). Android classloader finds
          # the older version first (it lives in the base DEX files, loaded before our
          # classes17+), so the field is missing at runtime → NoSuchFieldError in the
          # static initializer → entire Utils class fails to load → steamClient is null.
          # Replace the missing field references with false (same fix as IS_OS_ANDROID).
          UTILS_FILE=$(find . -name "Utils.java" -path "*/javasteam/*" 2>/dev/null | head -1)
          if [ -n "$UTILS_FILE" ]; then
            sed -i \
              -e 's/SystemUtils\.IS_OS_MAC_OSX_SONOMA/false/g' \
              -e 's/SystemUtils\.IS_OS_MAC_OSX_VENTURA/false/g' \
              -e 's/SystemUtils\.IS_OS_MAC_OSX_MONTEREY/false/g' \
              -e 's/SystemUtils\.IS_OS_MAC_OSX_BIG_SUR/false/g' \
              -e 's/SystemUtils\.IS_OS_WINDOWS_11/false/g' \
              "$UTILS_FILE"
            echo "Patched $UTILS_FILE: replaced new SystemUtils OS fields with false"
            grep -n "SystemUtils\." "$UTILS_FILE" | head -20
          else
            # Fallback: patch any .java file that references the missing field
            echo "Utils.java not found by path — scanning all java files..."
            find . -name "*.java" | xargs grep -l "IS_OS_MAC_OSX_SONOMA" 2>/dev/null | while read f; do
              sed -i 's/SystemUtils\.IS_OS_MAC_OSX_SONOMA/false/g' "$f"
              echo "Patched $f"
            done
          fi

          # Build all subprojects' JARs (plain jar — no shadow relocation)
          echo "Building all JARs..."
          ./gradlew jar --no-daemon 2>&1 | tail -20

          echo "=== All built JARs ==="
          find . -name "*.jar" -path "*/build/libs/*" | grep -v "sources\|javadoc\|test"

          # Find the JAR that contains SteamClient — that's the main library
          MAIN_JAR=""
          for j in $(find . -name "*.jar" -path "*/build/libs/*" \
              | grep -v "sources\|javadoc\|test" | sort); do
            if jar tf "$j" 2>/dev/null | grep -q "SteamClient.class"; then
              MAIN_JAR="$j"
              echo "Found library JAR containing SteamClient: $MAIN_JAR"
              break
            fi
          done

          if [ -z "$MAIN_JAR" ]; then
            # Fallback: pick the largest JAR
            MAIN_JAR=$(find . -name "*.jar" -path "*/build/libs/*" \
              | grep -v "sources\|javadoc\|test" \
              | while read f; do echo "$(wc -c < "$f") $f"; done \
              | sort -rn | head -1 | cut -d' ' -f2-)
            echo "Fallback: using largest JAR: $MAIN_JAR"
          fi

          echo "Using JAR: $MAIN_JAR ($(du -sh "$MAIN_JAR" | cut -f1))"
          jar tf "$MAIN_JAR" | grep -E "SteamClient|EResult|ProtocolTypes" | head -5 || true

          echo "=== SteamApps handler classes ==="
          jar tf "$MAIN_JAR" | grep -i "steamapps" | sort || true
          echo "=== All callback classes ==="
          jar tf "$MAIN_JAR" | grep -i "callback" | sort || true

          cp "$MAIN_JAR" ../javasteam.jar

          # Grab the exact protobuf-java JAR that Gradle resolved for JavaSteam.
          # Using a hardcoded version (e.g. 3.25.4) risks a mismatch: JavaSteam's
          # generated protobufs reference RuntimeVersion$RuntimeDomain which only
          # exists in protobuf 4.x. Pulling from Gradle's own cache guarantees the
          # same version JavaSteam was compiled against.
          PROTO_JAR=$(find ~/.gradle/caches -name "protobuf-java-*.jar" \
            ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -1)
          if [ -n "$PROTO_JAR" ]; then
            echo "Using protobuf JAR from Gradle cache: $PROTO_JAR"
            cp "$PROTO_JAR" ../protobuf-java.jar
          else
            echo "ERROR: protobuf-java JAR not found in Gradle cache"; exit 1
          fi

          # kotlinx.coroutines.future.FutureKt: JavaSteam's beginAuthSessionViaQR() calls
          # await() from this class. In coroutines ≥1.7, FutureKt moved from the separate
          # kotlinx-coroutines-jdk8 artifact into kotlinx-coroutines-core-jvm. Gradle won't
          # cache a separate jdk8 JAR for modern JavaSteam builds.
          # Strategy: scan all coroutines JARs in Gradle cache for FutureKt.class, then
          # extract ONLY the kotlinx/coroutines/future/ package — this avoids shadowing
          # the base APK's existing (older) kotlinx-coroutines-core classes.
          echo "=== Coroutines JARs in Gradle cache ==="
          find ~/.gradle/caches -name "kotlinx-coroutines*.jar" \
            ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | sort

          FUTURE_JAR=$(find ~/.gradle/caches -name "*.jar" \
            ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | \
            while read j; do
              jar tf "$j" 2>/dev/null | grep -q "kotlinx/coroutines/future/FutureKt" \
                && echo "$j" && break
            done | head -1)

          if [ -z "$FUTURE_JAR" ]; then
            echo "FutureKt not in Gradle cache — detecting coroutines version for Maven fallback"
            COROUTINES_VER=$(find ~/.gradle/caches -name "kotlinx-coroutines-core-jvm-*.jar" \
              ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | \
              grep -oP 'kotlinx-coroutines-core-jvm-\K[0-9.]+' | sort -V | tail -1 || echo "")
            [ -z "$COROUTINES_VER" ] && COROUTINES_VER="1.8.1"
            echo "Downloading kotlinx-coroutines-jdk8-${COROUTINES_VER} from Maven Central"
            wget -q "https://repo1.maven.org/maven2/org/jetbrains/kotlinx/kotlinx-coroutines-jdk8/${COROUTINES_VER}/kotlinx-coroutines-jdk8-${COROUTINES_VER}.jar" \
              -O /tmp/coroutines-jdk8-fallback.jar
            FUTURE_JAR="/tmp/coroutines-jdk8-fallback.jar"
          fi

          echo "Extracting kotlinx/coroutines/future/ from: $FUTURE_JAR"
          FUTURE_ENTRIES=$(jar tf "$FUTURE_JAR" | grep "^kotlinx/coroutines/future/")
          echo "Entries to extract: $(echo "$FUTURE_ENTRIES" | wc -l)"
          mkdir -p coroutines_future_extract
          cd coroutines_future_extract
          jar xf "$FUTURE_JAR" $FUTURE_ENTRIES
          cd ..
          echo "Extracted $(find coroutines_future_extract -name '*.class' | wc -l) classes"
          cp -r coroutines_future_extract ../coroutines_future_extract

          # kotlin.enums: JavaSteam's ServerQuality.kt uses enumEntries() (Kotlin 1.9+ API)
          # which generates bytecode referencing kotlin.enums.EnumEntriesKt. The base APK's
          # Kotlin stdlib may predate 1.9 and not include this class → hard crash at runtime.
          # Extract ONLY kotlin/enums/ from our kotlinc stdlib to avoid shadowing other stdlib.
          KOTLIN_STDLIB="$HOME/kotlinc/lib/kotlin-stdlib.jar"
          ENUM_ENTRIES=$(jar tf "$KOTLIN_STDLIB" 2>/dev/null | grep "^kotlin/enums/")
          if [ -n "$ENUM_ENTRIES" ]; then
            echo "Extracting kotlin/enums/ from kotlinc stdlib..."
            mkdir -p kotlin_enums_extract
            cd kotlin_enums_extract
            jar xf "$KOTLIN_STDLIB" $ENUM_ENTRIES
            cd ..
            echo "Extracted $(find kotlin_enums_extract -name '*.class' | wc -l) kotlin.enums classes"
          else
            echo "kotlin/enums/ not found in kotlinc stdlib — creating empty placeholder"
            mkdir -p kotlin_enums_extract
          fi
          cp -r kotlin_enums_extract ../kotlin_enums_extract

          # kotlin.coroutines.jvm.internal.SpillingKt: added in Kotlin 2.x stdlib.
          # JavaSteam is compiled with Kotlin 2.x so its bytecode references SpillingKt, but
          # the base APK ships a Kotlin 1.9.x stdlib that doesn't have it → crash at runtime.
          # Our kotlinc is 1.9.x (matched to base APK) so we cannot extract from that stdlib.
          # Instead, pull from the Kotlin 2.x kotlin-stdlib JAR that Gradle downloaded when
          # building JavaSteam — same strategy as protobuf-java.jar version pinning.
          SPILLING_ENTRY="kotlin/coroutines/jvm/internal/SpillingKt.class"
          mkdir -p kotlin_spilling_extract
          KT2_STDLIB=$(find ~/.gradle/caches -name "kotlin-stdlib-*.jar" \
            ! -name "*sources*" ! -name "*javadoc*" ! -name "*metadata*" 2>/dev/null \
            | sort -V | tail -1)
          if [ -n "$KT2_STDLIB" ]; then
            echo "Kotlin 2.x stdlib from Gradle cache: $KT2_STDLIB"
            if jar tf "$KT2_STDLIB" 2>/dev/null | grep -q "$SPILLING_ENTRY"; then
              cd kotlin_spilling_extract
              jar xf "$KT2_STDLIB" "$SPILLING_ENTRY"
              cd ..
              echo "Extracted SpillingKt.class from Kotlin 2.x stdlib"
            else
              echo "SpillingKt.class not found in Kotlin 2.x stdlib either — skipping"
            fi
          else
            echo "No Kotlin stdlib found in Gradle cache — skipping SpillingKt extraction"
          fi
          cp -r kotlin_spilling_extract ../kotlin_spilling_extract

          # ---------------------------------------------------------------
          # DepotDownloader: copy its JAR + gather transitive deps from cache
          # so we can bundle them as a separate DEX and use them in Kotlin.
          # ---------------------------------------------------------------
          DD_JAR=$(find . -name "javasteam-depotdownloader-*.jar" -path "*/build/libs/*" \
            ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -1)
          if [ -n "$DD_JAR" ]; then
            echo "Found depotdownloader JAR: $DD_JAR ($(du -sh "$DD_JAR" | cut -f1))"
            cp "$DD_JAR" ../javasteam-depotdownloader.jar
          else
            echo "ERROR: javasteam-depotdownloader JAR not found — DepotDownloader unavailable"
            touch ../javasteam-depotdownloader.jar  # empty placeholder so CI doesn't fail
          fi

          # Gather Ktor CIO, Okio, kotlinx-serialization JARs from Gradle cache.
          # These are transitive deps of javasteam-depotdownloader.
          echo "=== Gathering DepotDownloader transitive deps from Gradle cache ==="
          GRADLE_CACHE=~/.gradle/caches/modules-2/files-2.1

          gather_jar() {
            local pattern="$1"
            local dest="$2"
            local found
            found=$(find "$GRADLE_CACHE" -name "$pattern" \
              ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | sort -V | tail -1)
            if [ -n "$found" ]; then
              echo "  ✓ $pattern → $(du -sh "$found" | cut -f1)"
              cp "$found" "$dest"
            else
              echo "  ✗ $pattern NOT FOUND — downloading from Maven Central"
              # Best-effort Maven download for missing JARs
              local group_path artifact version
              case "$pattern" in
                ktor-client-cio-jvm-*)  group_path="io/ktor"; artifact="ktor-client-cio-jvm"; version="3.2.2" ;;
                ktor-client-core-jvm-*) group_path="io/ktor"; artifact="ktor-client-core-jvm"; version="3.2.2" ;;
                ktor-io-jvm-*)          group_path="io/ktor"; artifact="ktor-io-jvm"; version="3.2.2" ;;
                ktor-http-jvm-*)        group_path="io/ktor"; artifact="ktor-http-jvm"; version="3.2.2" ;;
                ktor-utils-jvm-*)       group_path="io/ktor"; artifact="ktor-utils-jvm"; version="3.2.2" ;;
                ktor-network-jvm-*)     group_path="io/ktor"; artifact="ktor-network-jvm"; version="3.2.2" ;;
                ktor-network-tls-jvm-*) group_path="io/ktor"; artifact="ktor-network-tls-jvm"; version="3.2.2" ;;
                okio-jvm-*)             group_path="com/squareup/okio"; artifact="okio-jvm"; version="3.16.0" ;;
                okhttp-jvm-*)           group_path="com/squareup/okhttp3"; artifact="okhttp-jvm"; version="MULTI" ;;
                okhttp-coroutines-*)    group_path="com/squareup/okhttp3"; artifact="okhttp-coroutines"; version="MULTI" ;;
                kotlinx-io-core-jvm-*)  group_path="org/jetbrains/kotlinx"; artifact="kotlinx-io-core-jvm"; version="0.7.0" ;;
                kotlinx-serialization-json-jvm-*)  group_path="org/jetbrains/kotlinx"; artifact="kotlinx-serialization-json-jvm"; version="1.9.0" ;;
                kotlinx-serialization-core-jvm-*)  group_path="org/jetbrains/kotlinx"; artifact="kotlinx-serialization-core-jvm"; version="1.9.0" ;;
                *) group_path=""; artifact=""; version="" ;;
              esac
              if [ -n "$artifact" ] && [ "$version" != "MULTI" ]; then
                wget -q "https://repo1.maven.org/maven2/${group_path}/${artifact}/${version}/${artifact}-${version}.jar" \
                  -O "$dest" && jar tf "$dest" > /dev/null 2>&1 \
                  && echo "  ✓ downloaded $artifact-$version" \
                  || { echo "  ✗ download/validate failed for $artifact-$version"; touch "$dest"; }
              elif [ "$version" = "MULTI" ]; then
                # Try multiple versions in order until we get a valid JAR
                local ok=0
                for v in "5.1.0" "5.0.0" "5.0.0-alpha.14" "4.12.0"; do
                  wget -q "https://repo1.maven.org/maven2/${group_path}/${artifact}/${v}/${artifact}-${v}.jar" \
                    -O "$dest" 2>/dev/null && jar tf "$dest" > /dev/null 2>&1 && {
                    echo "  ✓ downloaded $artifact-$v"; ok=1; break
                  }
                  echo "  ✗ $artifact-$v not valid, trying next..."
                done
                [ $ok -eq 0 ] && { echo "  ✗ all versions failed for $artifact"; touch "$dest"; }
              else
                touch "$dest"
              fi
            fi
          }

          mkdir -p ../depot_deps
          gather_jar "ktor-client-cio-jvm-*.jar"               "../depot_deps/ktor-client-cio.jar"
          gather_jar "ktor-client-core-jvm-*.jar"              "../depot_deps/ktor-client-core.jar"
          gather_jar "ktor-io-jvm-*.jar"                       "../depot_deps/ktor-io.jar"
          gather_jar "ktor-http-jvm-*.jar"                     "../depot_deps/ktor-http.jar"
          gather_jar "ktor-utils-jvm-*.jar"                    "../depot_deps/ktor-utils.jar"
          gather_jar "ktor-network-jvm-*.jar"                  "../depot_deps/ktor-network.jar"
          gather_jar "ktor-network-tls-jvm-*.jar"              "../depot_deps/ktor-network-tls.jar"
          gather_jar "okio-jvm-*.jar"                          "../depot_deps/okio.jar"
          # OkHttp3 + coroutines extension: javasteam CDN Client.kt uses okhttp3.coroutines.ExecuteAsyncKt
          # OkHttp 5.x uses 'okhttp-jvm' artifact (Kotlin Multiplatform naming)
          gather_jar "okhttp-jvm-*.jar"                         "../depot_deps/okhttp.jar"
          gather_jar "okhttp-coroutines-*.jar"                  "../depot_deps/okhttp-coroutines.jar"
          gather_jar "kotlinx-io-core-jvm-*.jar"               "../depot_deps/kotlinx-io-core.jar"
          gather_jar "kotlinx-serialization-json-jvm-*.jar"    "../depot_deps/kotlinx-serialization-json.jar"
          gather_jar "kotlinx-serialization-core-jvm-*.jar"    "../depot_deps/kotlinx-serialization-core.jar"

          echo "=== DepotDownloader deps gathered ==="
          ls -lh ../javasteam-depotdownloader.jar ../depot_deps/

          cd ..
          ls -lh javasteam.jar protobuf-java.jar javasteam-depotdownloader.jar

      - name: Decode base APK with apktool
        run: |
          APK=$(ls base/*.apk | head -1)
          echo "Decoding: $APK"
          java -jar $HOME/bin/apktool.jar d "$APK" -o apktool_out_base -f
          echo "DEX files found:"
          ls apktool_out_base/smali_classes* 2>/dev/null | head -5 || echo "(none)"

      - name: Fix aapt2 incompatible resources
        run: |
          rm -f apktool_out_base/res/values/raws.xml
          sed -i '/firebase_common_keep\|firebase_crashlytics_keep/d' \
            apktool_out_base/res/values/public.xml || true
          DRAWABLE_DIR=apktool_out_base/res/drawable
          AB_COUNT=$(find "$DRAWABLE_DIR" -name 'ab_*.png' | wc -l)
          echo "Removing $AB_COUNT ab_*.png pseudo-PNG files"
          find "$DRAWABLE_DIR" -name 'ab_*.png' -delete
          rm -f "$DRAWABLE_DIR/animated_background.xml" \
                "$DRAWABLE_DIR/animated_gear_background.xml"
          sed -i '/name="ab_[0-9]\|name="ab_gear_\|name="animated_background\|name="animated_gear_background/d' \
            apktool_out_base/res/values/public.xml
          echo "Removed ab_*/animated_background entries from public.xml"

      - name: Apply patches
        run: |
          echo "Applying patches from patches/ ..."
          cp -r patches/. apktool_out_base/

          # Replace all inlined ContentsManager.REMOTE_PROFILES const-strings.
          # javac bakes static final Strings at every call site, so patching the
          # field declaration alone is not enough — all 4 smali callers need it too.
          find apktool_out_base -name "*.smali" -exec sed -i \
            's|https://raw.githubusercontent.com/StevenMXZ/Winlator-Contents/main/contents.json|https://raw.githubusercontent.com/Xnick417x/Winlator-Bionic-Nightly-wcp/refs/heads/main/content.json|g' \
            {} +
          echo "Contents URL replacement done ($(grep -rl 'Xnick417x' apktool_out_base | wc -l) files updated)"

          echo "Patch manifest activities:"
          grep "store\." apktool_out_base/AndroidManifest.xml | grep -v "^$" | head -20
          echo "Patch menu items:"
          grep "main_menu_gog\|main_menu_epic\|main_menu_amazon\|main_menu_steam" \
            apktool_out_base/res/menu/main_menu.xml

      - name: Download org.json for Java compilation
        run: |
          wget -q "https://repo1.maven.org/maven2/org/json/json/20240303/json-20240303.jar" \
            -O org-json.jar
          # protobuf-java.jar is copied from the Gradle cache in the "Build JavaSteam" step
          # (exact version that JavaSteam was compiled against — avoids RuntimeVersion mismatch)
          # zxing-core: QR code generation for QrLoginActivity
          wget -q "https://repo1.maven.org/maven2/com/google/zxing/core/3.5.2/core-3.5.2.jar" \
            -O zxing-core.jar
          # commons-lang3: runtime dep of JavaSteam HardwareUtils.getMachineName()
          # (called from AuthSessionDetails.<init>) — not bundled in plain jar task output
          wget -q "https://repo1.maven.org/maven2/org/apache/commons/commons-lang3/3.14.0/commons-lang3-3.14.0.jar" \
            -O commons-lang3.jar

      - name: Compile Java store extension (GOG/Epic/Amazon + Steam) → classes17.dex
        run: |
          ANDROID_JAR=$(ls $ANDROID_SDK_ROOT/platforms/android-*/android.jar 2>/dev/null \
            | sort -V | tail -1)
          echo "Using android.jar: $ANDROID_JAR"

          # extension/*.java    — GOG/Epic/Amazon (needs org-json.jar)
          # extension/steam/*.java — SteamRepository + SteamDepotDownloader (needs javasteam.jar + protobuf-java.jar)
          # Both sets share android.jar.
          mkdir -p ext_java_classes
          javac -source 8 -target 8 \
            -cp "$ANDROID_JAR:org-json.jar:javasteam.jar:javasteam-depotdownloader.jar:protobuf-java.jar:zxing-core.jar:commons-lang3.jar" \
            -d ext_java_classes \
            extension/*.java extension/steam/*.java
          echo "Compiled $(find ext_java_classes -name '*.class' | wc -l) Java class files"

          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          mkdir -p ext_java_dex
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/d8 \
            --release --min-api 26 --output ext_java_dex \
            $(find ext_java_classes -name "*.class") \
            $(find coroutines_future_extract -name "*.class") \
            $(find kotlin_enums_extract -name "*.class") \
            $(find kotlin_spilling_extract -name "*.class") \
            zxing-core.jar \
            commons-lang3.jar \
            protobuf-java.jar
          ls -lh ext_java_dex/classes.dex
          echo "classes17.dex ready: $(du -sh ext_java_dex/classes.dex | cut -f1)"

      - name: Bundle JavaSteam → classes18.dex
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          mkdir -p ext_steam_lib_dex
          echo "Running d8 on JavaSteam JAR..."
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/d8 \
            --release --min-api 26 --output ext_steam_lib_dex \
            javasteam.jar
          # d8 may produce multiple DEX files if the JAR is large
          echo "JavaSteam DEX output:"
          ls -lh ext_steam_lib_dex/

      - name: Bundle DepotDownloader → DEX
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          mkdir -p ext_depot_dex

          # Build list of JARs to bundle: depotdownloader + all gathered deps.
          # okhttp-coroutines.jar is EXCLUDED from the runtime DEX — we provide
          # a compat shim (extension/steam/compat/ExecuteAsyncKt.kt) compiled
          # into the Kotlin Steam DEX that uses resumeWith(Result) instead of
          # the Kotlin-2.x-only resume(value, Function3) overload.
          DD_JARS="javasteam-depotdownloader.jar"
          for dep in depot_deps/*.jar; do
            # Skip empty placeholder JARs (size 0)
            [ -s "$dep" ] || { echo "Skipping empty: $dep"; continue; }
            # Skip okhttp-coroutines — replaced by compat shim in Kotlin DEX
            case "$dep" in *okhttp-coroutines*) echo "Excluding (compat shim): $dep"; continue ;; esac
            DD_JARS="$DD_JARS $dep"
          done

          echo "=== DepotDownloader DEX input JARs ==="
          for j in $DD_JARS; do echo "  $(du -sh "$j" | cut -f1)  $j"; done

          # Strip Kotlin module metadata from all depotdownloader JARs
          for j in $DD_JARS; do
            zip -d "$j" 'META-INF/*.kotlin_module' 2>/dev/null || true
          done

          if [ -s "javasteam-depotdownloader.jar" ]; then
            $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/d8 \
              --release --min-api 26 --output ext_depot_dex \
              $DD_JARS
            echo "=== DepotDownloader DEX output ==="
            ls -lh ext_depot_dex/
          else
            echo "javasteam-depotdownloader.jar is empty — skipping DEX bundling"
            # Create a stub so the inject step doesn't fail
            touch ext_depot_dex/.skip
          fi

      - name: Compile Kotlin Steam extension → classes.dex (for classes19+)
        run: |
          ANDROID_JAR=$(ls $ANDROID_SDK_ROOT/platforms/android-*/android.jar 2>/dev/null \
            | sort -V | tail -1)
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)

          # Strip Kotlin module metadata from javasteam.jar and javasteam-depotdownloader.jar
          # so kotlinc 1.9.x doesn't error on "metadata version 2.2.0, expected 1.9.0".
          # The .class files still work fine as Java bytecode; only the Kotlin metadata is removed.
          zip -d javasteam.jar 'META-INF/*.kotlin_module' 2>/dev/null || true
          zip -d javasteam-depotdownloader.jar 'META-INF/*.kotlin_module' 2>/dev/null || true
          for dep in depot_deps/*.jar; do
            zip -d "$dep" 'META-INF/*.kotlin_module' 2>/dev/null || true
          done

          mkdir -p ext_kotlin_classes
          KT_FILES=$(find extension/steam -name "*.kt" | sort)
          echo "Compiling Kotlin files:"
          echo "$KT_FILES"

          # Build depot deps classpath for kotlinc (all non-empty gathered JARs)
          DEPOT_CP=""
          for dep in depot_deps/*.jar javasteam-depotdownloader.jar; do
            [ -s "$dep" ] && DEPOT_CP="$DEPOT_CP:$dep"
          done

          # Debug: check if okhttp3 classes are inside javasteam.jar (fat/shadow JAR)
          echo "=== OkHttp3 in javasteam.jar? ==="
          jar tf javasteam.jar 2>/dev/null | grep "^okhttp3/" | head -3 || echo "(okhttp3 not in javasteam.jar)"
          echo "=== OkHttp3 in Gradle cache ==="
          find ~/.gradle -path "*okhttp3*" -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -5 || echo "(none)"

          # okhttp3.Call/Callback/Response needed for compat shim compilation.
          # javasteam.jar is already on the classpath — if it embeds okhttp3, nothing extra needed.
          # Otherwise find okhttp in Gradle cache by group path (more reliable than filename glob).
          OKHTTP_CP=""
          if jar tf javasteam.jar 2>/dev/null | grep -q "^okhttp3/"; then
            echo "okhttp3 embedded in javasteam.jar — no separate JAR needed for compilation"
          else
            OKHTTP_JAR=$(find ~/.gradle/caches/modules-2/files-2.1/com.squareup.okhttp3/okhttp \
              -name "*.jar" ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | sort -V | tail -1)
            [ -z "$OKHTTP_JAR" ] && OKHTTP_JAR=$(find ~/.gradle -path "*com.squareup.okhttp3*" \
              -name "okhttp-*.jar" ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | sort -V | tail -1)
            if [ -n "$OKHTTP_JAR" ]; then
              echo "okhttp3 found at: $OKHTTP_JAR"
              OKHTTP_CP=":$OKHTTP_JAR"
            elif [ -s "depot_deps/okhttp.jar" ]; then
              echo "okhttp3 using depot_deps/okhttp.jar"
              OKHTTP_CP=":depot_deps/okhttp.jar"
            else
              echo "WARNING: okhttp3 not found — compat shim compilation may fail"
            fi
          fi

          # kotlinx-coroutines-core is already bundled in the base APK so we don't DEX it,
          # but we need it on the COMPILATION classpath for SteamDepotDownloader.kt.
          COROUTINES_JAR=$(find ~/.gradle/caches -name "kotlinx-coroutines-core-jvm-*.jar" \
            ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | sort -V | tail -1)
          if [ -z "$COROUTINES_JAR" ]; then
            echo "kotlinx-coroutines-core not in Gradle cache — downloading 1.9.0 from Maven"
            wget -q "https://repo1.maven.org/maven2/org/jetbrains/kotlinx/kotlinx-coroutines-core-jvm/1.9.0/kotlinx-coroutines-core-jvm-1.9.0.jar" \
              -O /tmp/coroutines-core.jar && COROUTINES_JAR="/tmp/coroutines-core.jar"
          fi
          echo "Coroutines JAR: $COROUTINES_JAR"

          # -no-stdlib: don't auto-include stdlib in the output (it's already in the base APK).
          # But we still need it on the COMPILATION classpath so built-in types resolve.
          # kotlin-stdlib.jar lives in $HOME/kotlinc/lib/ from the unzipped compiler distribution.
          # ext_java_classes: SteamRepository.java was compiled in the Java step — Kotlin files
          # reference SteamRepository so it must be on the Kotlin classpath.
          # -Xskip-metadata-version-check: javasteam* JARs compiled with Kotlin 2.2.0 but
          #   kotlinc here is 1.9.x (matched to base APK). Skip version check — .class files
          #   are still valid Java bytecode and usable from Kotlin 1.9.
          KOTLIN_STDLIB="$HOME/kotlinc/lib/kotlin-stdlib.jar"
          COROUTINES_CP=$([ -n "$COROUTINES_JAR" ] && echo ":$COROUTINES_JAR" || echo "")
          kotlinc \
            -no-stdlib \
            -Xskip-metadata-version-check \
            -classpath "$ANDROID_JAR:javasteam.jar:$KOTLIN_STDLIB:ext_java_classes:zxing-core.jar${DEPOT_CP}${COROUTINES_CP}${OKHTTP_CP}" \
            -d ext_kotlin_classes \
            $KT_FILES
          echo "Kotlin compilation done: $(find ext_kotlin_classes -name '*.class' | wc -l) class files"

          mkdir -p ext_kotlin_dex
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/d8 \
            --release --min-api 26 --output ext_kotlin_dex \
            $(find ext_kotlin_classes -name "*.class")
          echo "Kotlin DEX output:"
          ls -lh ext_kotlin_dex/

      - name: Build modified APK with apktool
        run: |
          java -jar $HOME/bin/apktool.jar b apktool_out_base \
            --use-aapt1 \
            -o rebuilt-unsigned.apk
          ls -lh rebuilt-unsigned.apk

      - name: Re-inject original ab_*.png and animated XMLs from base APK
        run: |
          BASE_APK=$(ls base/*.apk | head -1)
          mkdir -p ab_reinject
          unzip -q "$BASE_APK" \
            'res/drawable/ab_*.png' \
            'res/drawable/animated_background.xml' \
            'res/drawable/animated_gear_background.xml' \
            -d ab_reinject 2>/dev/null || true
          INJECTED=$(find ab_reinject -type f | wc -l)
          echo "Re-injecting $INJECTED files from $BASE_APK"
          if [ "$INJECTED" -gt 0 ]; then
            (cd ab_reinject && zip -r ../rebuilt-unsigned.apk res/)
            echo "Done. ab_/animated entries in APK:"
            unzip -l rebuilt-unsigned.apk | grep 'res/drawable/ab_\|animated_background\|animated_gear' | wc -l
          fi

      - name: Inject classes16.dex (Java stores — GOG/Epic/Amazon)
        run: |
          cp ext_java_dex/classes.dex classes16.dex
          zip -j rebuilt-unsigned.apk classes16.dex
          echo "classes16.dex injected ($(du -sh classes16.dex | cut -f1))"

      - name: Inject classes17.dex+ (JavaSteam library)
        run: |
          # d8 may have split JavaSteam into multiple DEX files
          DEX_IDX=17
          for dex_file in $(ls ext_steam_lib_dex/classes*.dex | sort); do
            TARGET_NAME="classes${DEX_IDX}.dex"
            cp "$dex_file" "$TARGET_NAME"
            zip -j rebuilt-unsigned.apk "$TARGET_NAME"
            echo "${TARGET_NAME} injected ($(du -sh "$TARGET_NAME" | cut -f1))"
            DEX_IDX=$((DEX_IDX + 1))
          done
          echo "Next available DEX index: $DEX_IDX"
          echo "NEXT_DEX_IDX=$DEX_IDX" >> $GITHUB_ENV

      - name: Inject Kotlin Steam extension DEX
        run: |
          DEX_IDX=${{ env.NEXT_DEX_IDX }}
          for dex_file in $(ls ext_kotlin_dex/classes*.dex | sort); do
            TARGET_NAME="classes${DEX_IDX}.dex"
            cp "$dex_file" "$TARGET_NAME"
            zip -j rebuilt-unsigned.apk "$TARGET_NAME"
            echo "${TARGET_NAME} injected ($(du -sh "$TARGET_NAME" | cut -f1))"
            DEX_IDX=$((DEX_IDX + 1))
          done
          echo "NEXT_DEX_IDX_AFTER_KT=$DEX_IDX" >> $GITHUB_ENV

      - name: Inject DepotDownloader DEX
        run: |
          DEX_IDX=${{ env.NEXT_DEX_IDX_AFTER_KT }}
          if ls ext_depot_dex/classes*.dex 2>/dev/null | head -1 | grep -q "."; then
            for dex_file in $(ls ext_depot_dex/classes*.dex | sort); do
              TARGET_NAME="classes${DEX_IDX}.dex"
              cp "$dex_file" "$TARGET_NAME"
              zip -j rebuilt-unsigned.apk "$TARGET_NAME"
              echo "${TARGET_NAME} injected ($(du -sh "$TARGET_NAME" | cut -f1))"
              DEX_IDX=$((DEX_IDX + 1))
            done
            echo "DepotDownloader DEX injection complete. Final DEX index: $DEX_IDX"
          else
            echo "No DepotDownloader DEX files found — skipping (depotdownloader JAR was empty)"
          fi

      - name: Zipalign
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/zipalign \
            -f -v 4 rebuilt-unsigned.apk rebuilt-aligned.apk

      - name: Upload aligned APK for variant builds
        if: "!contains(github.ref_name, '-pre') && !contains(github.ref_name, '-beta')"
        uses: actions/upload-artifact@v4
        with:
          name: rebuilt-aligned
          path: rebuilt-aligned.apk
          retention-days: 1

      - name: Sign APK
        id: sign
        run: |
          APK_NAME="LudashiPlus-${GITHUB_REF_NAME}.apk"
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner sign \
            --key testkey.pk8 \
            --cert testkey.x509.pem \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$APK_NAME" \
            rebuilt-aligned.apk
          echo "Signed: $APK_NAME ($(du -sh "$APK_NAME" | cut -f1))"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        run: |
          APK_NAME="${{ steps.sign.outputs.apk_name }}"
          TAG="${GITHUB_REF_NAME}"

          # Stable release for v* tags; prerelease for branch/dispatch builds
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            PRERELEASE_FLAG=""
          else
            PRERELEASE_FLAG="--prerelease"
          fi

          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" "$APK_NAME" --clobber
            gh release edit "$TAG" --draft=false $PRERELEASE_FLAG
            echo "Uploaded to existing release $TAG"
          else
            gh release create "$TAG" "$APK_NAME" \
              --title "Ludashi-plus $TAG" \
              --notes "Automated build — see PROGRESS_LOG.md for details." \
              $PRERELEASE_FLAG
            echo "Created new release $TAG with $APK_NAME"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-variants:
    needs: build
    if: "!contains(github.ref_name, '-pre') && !contains(github.ref_name, '-beta')"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - suffix: Vanilla
            package: com.winlator.vanilla
            label: "Winlator Ludashi+ Vanilla"
          - suffix: PuBG
            package: com.tencent.ig
            label: "Winlator Ludashi+ PuBG"
          - suffix: Genshin
            package: com.miHoYo.GenshinImpact
            label: "Winlator Ludashi+ Genshin"
          - suffix: AnTuTu
            package: com.antutu.ABenchMark
            label: "Winlator Ludashi+ AnTuTu"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install apktool 2.9.3
        run: |
          mkdir -p $HOME/bin
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar" \
            -O $HOME/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" \
            -O $HOME/bin/apktool
          chmod +x $HOME/bin/apktool
          echo "$HOME/bin" >> $GITHUB_PATH

      - name: Download aligned APK from build job
        uses: actions/download-artifact@v4
        with:
          name: rebuilt-aligned

      - name: Patch manifest, rebuild, sign
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          BASE_PKG="com.ludashi.benchmark"
          NEW_PKG="${{ matrix.package }}"
          NEW_LABEL="${{ matrix.label }}"
          APK_NAME="LudashiPlus-${GITHUB_REF_NAME}-${{ matrix.suffix }}.apk"

          echo "=== Building variant: $NEW_LABEL ($NEW_PKG) ==="

          java -jar $HOME/bin/apktool.jar d rebuilt-aligned.apk -o variant_out -f

          sed -i \
            -e "s|package=\"${BASE_PKG}\"|package=\"${NEW_PKG}\"|g" \
            -e "s|${BASE_PKG}\.tileprovider|${NEW_PKG}.tileprovider|g" \
            -e "s|${BASE_PKG}\.core\.WinlatorFilesProvider|${NEW_PKG}.core.WinlatorFilesProvider|g" \
            -e "s|${BASE_PKG}\.androidx-startup|${NEW_PKG}.androidx-startup|g" \
            variant_out/AndroidManifest.xml

          sed -i \
            -e "s|android:label=\"Winlator Ludashi+\"|android:label=\"${NEW_LABEL}\"|g" \
            variant_out/AndroidManifest.xml

          echo "--- Verification ---"
          grep 'package=' variant_out/AndroidManifest.xml | head -1
          grep 'android:label=' variant_out/AndroidManifest.xml | head -1
          grep 'android:authorities=' variant_out/AndroidManifest.xml

          java -jar $HOME/bin/apktool.jar b variant_out --use-aapt1 -o variant-rebuilt.apk

          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/zipalign \
            -f -v 4 variant-rebuilt.apk variant-aligned.apk

          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner sign \
            --key testkey.pk8 \
            --cert testkey.x509.pem \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$APK_NAME" \
            variant-aligned.apk

          echo "Variant ready: $APK_NAME ($(du -sh "$APK_NAME" | cut -f1))"

      - name: Upload variant to release
        run: |
          gh release upload "${GITHUB_REF_NAME}" \
            "LudashiPlus-${GITHUB_REF_NAME}-${{ matrix.suffix }}.apk" --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
