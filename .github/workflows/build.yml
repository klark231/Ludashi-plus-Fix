name: Build Ludashi-plus APK

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install apktool 2.9.3
        run: |
          mkdir -p $HOME/bin
          wget -q "https://github.com/iBotPeaches/Apktool/releases/download/v2.9.3/apktool_2.9.3.jar" \
            -O $HOME/bin/apktool.jar
          wget -q "https://raw.githubusercontent.com/iBotPeaches/Apktool/master/scripts/linux/apktool" \
            -O $HOME/bin/apktool
          chmod +x $HOME/bin/apktool
          echo "$HOME/bin" >> $GITHUB_PATH
          java -jar $HOME/bin/apktool.jar --version

      - name: Download base Ludashi APK (Winlator-Ludashi v2.9 bionic)
        run: |
          gh release download v2.9 \
            --pattern "ludashi-bionic.apk" \
            -D base/ \
            -R StevenMXZ/Winlator-Ludashi
          ls -lh base/
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Detect Kotlin version in base APK and install matching kotlinc
        run: |
          BASE_APK=$(ls base/*.apk | head -1)
          # Extract classes.dex and look for kotlin-stdlib version string
          mkdir -p kotlin_detect
          unzip -q "$BASE_APK" "classes.dex" -d kotlin_detect/ 2>/dev/null || true
          # Try to find kotlin version from META-INF in the APK zip entries
          KT_VERSION=$(unzip -p "$BASE_APK" "META-INF/kotlin-stdlib.kotlin_module" 2>/dev/null \
            | strings | grep -oP '\d+\.\d+\.\d+' | head -1 || echo "")
          if [ -z "$KT_VERSION" ]; then
            # Fallback: look for version string in all META-INF entries
            KT_VERSION=$(unzip -l "$BASE_APK" | grep -oP 'kotlin-stdlib-\K[\d.]+' | head -1 || echo "")
          fi
          if [ -z "$KT_VERSION" ]; then
            # Safe fallback — use 1.9.24 (widely compatible, works with most coroutines in APKs from 2024)
            KT_VERSION="1.9.24"
            echo "Could not detect Kotlin version — defaulting to $KT_VERSION"
          else
            echo "Detected Kotlin version: $KT_VERSION"
          fi
          echo "KT_VERSION=$KT_VERSION" >> $GITHUB_ENV

          # Download kotlinc matching detected version
          KT_MAJOR_MINOR=$(echo "$KT_VERSION" | cut -d. -f1-2)
          KOTLINC_URL="https://github.com/JetBrains/kotlin/releases/download/v${KT_VERSION}/kotlin-compiler-${KT_VERSION}.zip"
          echo "Downloading: $KOTLINC_URL"
          wget -q "$KOTLINC_URL" -O kotlinc.zip || {
            # If exact version not found, try latest 1.9.x
            FALLBACK="1.9.24"
            echo "Exact version not found, falling back to $FALLBACK"
            wget -q "https://github.com/JetBrains/kotlin/releases/download/v${FALLBACK}/kotlin-compiler-${FALLBACK}.zip" \
              -O kotlinc.zip
          }
          unzip -q kotlinc.zip -d $HOME/
          echo "$HOME/kotlinc/bin" >> $GITHUB_PATH
          kotlinc -version

      - name: Build JavaSteam from source
        run: |
          # Clone and build JavaSteam.
          # JavaSteam is a multi-module Gradle project; we must find the submodule JAR
          # that contains the main library classes (SteamClient, EResult, etc.).
          git clone --depth 1 https://github.com/LossyDragon/JavaSteam javasteam_src
          cd javasteam_src

          echo "=== Project structure ==="
          ls -1
          cat settings.gradle 2>/dev/null || cat settings.gradle.kts 2>/dev/null || true

          # Patch HardwareUtils.java: SystemUtils.IS_OS_ANDROID does not exist in
          # commons-lang3 3.14.0 (field was added in a later release). Replace with
          # false so the Android branch is skipped; HardwareUtils falls through to
          # the standard platform detection. No behaviour change on Android — the
          # machine name returned will be the hostname, which is fine for Steam auth.
          HW_FILE=$(find . -name "HardwareUtils.java" 2>/dev/null | head -1)
          if [ -n "$HW_FILE" ]; then
            sed -i 's/SystemUtils\.IS_OS_ANDROID/false/g' "$HW_FILE"
            echo "Patched $HW_FILE: replaced SystemUtils.IS_OS_ANDROID with false"
          else
            echo "WARNING: HardwareUtils.java not found — skipping patch"
          fi

          # Patch Utils.java: the base APK bundles an older commons-lang3 that does
          # NOT have IS_OS_MAC_OSX_SONOMA (added in 3.14.0). Android classloader finds
          # the older version first (it lives in the base DEX files, loaded before our
          # classes17+), so the field is missing at runtime → NoSuchFieldError in the
          # static initializer → entire Utils class fails to load → steamClient is null.
          # Replace the missing field references with false (same fix as IS_OS_ANDROID).
          UTILS_FILE=$(find . -name "Utils.java" -path "*/javasteam/*" 2>/dev/null | head -1)
          if [ -n "$UTILS_FILE" ]; then
            sed -i \
              -e 's/SystemUtils\.IS_OS_MAC_OSX_SONOMA/false/g' \
              -e 's/SystemUtils\.IS_OS_MAC_OSX_VENTURA/false/g' \
              -e 's/SystemUtils\.IS_OS_MAC_OSX_MONTEREY/false/g' \
              -e 's/SystemUtils\.IS_OS_MAC_OSX_BIG_SUR/false/g' \
              -e 's/SystemUtils\.IS_OS_WINDOWS_11/false/g' \
              "$UTILS_FILE"
            echo "Patched $UTILS_FILE: replaced new SystemUtils OS fields with false"
            grep -n "SystemUtils\." "$UTILS_FILE" | head -20
          else
            # Fallback: patch any .java file that references the missing field
            echo "Utils.java not found by path — scanning all java files..."
            find . -name "*.java" | xargs grep -l "IS_OS_MAC_OSX_SONOMA" 2>/dev/null | while read f; do
              sed -i 's/SystemUtils\.IS_OS_MAC_OSX_SONOMA/false/g' "$f"
              echo "Patched $f"
            done
          fi

          # Build all subprojects' JARs (plain jar — no shadow relocation)
          echo "Building all JARs..."
          ./gradlew jar --no-daemon 2>&1 | tail -20

          echo "=== All built JARs ==="
          find . -name "*.jar" -path "*/build/libs/*" | grep -v "sources\|javadoc\|test"

          # Find the JAR that contains SteamClient — that's the main library
          MAIN_JAR=""
          for j in $(find . -name "*.jar" -path "*/build/libs/*" \
              | grep -v "sources\|javadoc\|test" | sort); do
            if jar tf "$j" 2>/dev/null | grep -q "SteamClient.class"; then
              MAIN_JAR="$j"
              echo "Found library JAR containing SteamClient: $MAIN_JAR"
              break
            fi
          done

          if [ -z "$MAIN_JAR" ]; then
            # Fallback: pick the largest JAR
            MAIN_JAR=$(find . -name "*.jar" -path "*/build/libs/*" \
              | grep -v "sources\|javadoc\|test" \
              | while read f; do echo "$(wc -c < "$f") $f"; done \
              | sort -rn | head -1 | cut -d' ' -f2-)
            echo "Fallback: using largest JAR: $MAIN_JAR"
          fi

          echo "Using JAR: $MAIN_JAR ($(du -sh "$MAIN_JAR" | cut -f1))"
          jar tf "$MAIN_JAR" | grep -E "SteamClient|EResult|ProtocolTypes" | head -5 || true

          cp "$MAIN_JAR" ../javasteam.jar

          # Grab the exact protobuf-java JAR that Gradle resolved for JavaSteam.
          # Using a hardcoded version (e.g. 3.25.4) risks a mismatch: JavaSteam's
          # generated protobufs reference RuntimeVersion$RuntimeDomain which only
          # exists in protobuf 4.x. Pulling from Gradle's own cache guarantees the
          # same version JavaSteam was compiled against.
          PROTO_JAR=$(find ~/.gradle/caches -name "protobuf-java-*.jar" \
            ! -name "*sources*" ! -name "*javadoc*" 2>/dev/null | head -1)
          if [ -n "$PROTO_JAR" ]; then
            echo "Using protobuf JAR from Gradle cache: $PROTO_JAR"
            cp "$PROTO_JAR" ../protobuf-java.jar
          else
            echo "ERROR: protobuf-java JAR not found in Gradle cache"; exit 1
          fi

          cd ..
          ls -lh javasteam.jar protobuf-java.jar

      - name: Decode base APK with apktool
        run: |
          APK=$(ls base/*.apk | head -1)
          echo "Decoding: $APK"
          java -jar $HOME/bin/apktool.jar d "$APK" -o apktool_out_base -f
          echo "DEX files found:"
          ls apktool_out_base/smali_classes* 2>/dev/null | head -5 || echo "(none)"

      - name: Fix aapt2 incompatible resources
        run: |
          rm -f apktool_out_base/res/values/raws.xml
          sed -i '/firebase_common_keep\|firebase_crashlytics_keep/d' \
            apktool_out_base/res/values/public.xml || true
          DRAWABLE_DIR=apktool_out_base/res/drawable
          AB_COUNT=$(find "$DRAWABLE_DIR" -name 'ab_*.png' | wc -l)
          echo "Removing $AB_COUNT ab_*.png pseudo-PNG files"
          find "$DRAWABLE_DIR" -name 'ab_*.png' -delete
          rm -f "$DRAWABLE_DIR/animated_background.xml" \
                "$DRAWABLE_DIR/animated_gear_background.xml"
          sed -i '/name="ab_[0-9]\|name="ab_gear_\|name="animated_background\|name="animated_gear_background/d' \
            apktool_out_base/res/values/public.xml
          echo "Removed ab_*/animated_background entries from public.xml"

      - name: Apply patches
        run: |
          echo "Applying patches from patches/ ..."
          cp -r patches/. apktool_out_base/
          echo "Patch manifest activities:"
          grep "store\." apktool_out_base/AndroidManifest.xml | grep -v "^$" | head -20
          echo "Patch menu items:"
          grep "main_menu_gog\|main_menu_epic\|main_menu_amazon\|main_menu_steam" \
            apktool_out_base/res/menu/main_menu.xml

      - name: Download org.json for Java compilation
        run: |
          wget -q "https://repo1.maven.org/maven2/org/json/json/20240303/json-20240303.jar" \
            -O org-json.jar
          # protobuf-java.jar is copied from the Gradle cache in the "Build JavaSteam" step
          # (exact version that JavaSteam was compiled against — avoids RuntimeVersion mismatch)
          # zxing-core: QR code generation for QrLoginActivity
          wget -q "https://repo1.maven.org/maven2/com/google/zxing/core/3.5.2/core-3.5.2.jar" \
            -O zxing-core.jar
          # commons-lang3: runtime dep of JavaSteam HardwareUtils.getMachineName()
          # (called from AuthSessionDetails.<init>) — not bundled in plain jar task output
          wget -q "https://repo1.maven.org/maven2/org/apache/commons/commons-lang3/3.14.0/commons-lang3-3.14.0.jar" \
            -O commons-lang3.jar

      - name: Compile Java store extension (GOG/Epic/Amazon + Steam) → classes17.dex
        run: |
          ANDROID_JAR=$(ls $ANDROID_SDK_ROOT/platforms/android-*/android.jar 2>/dev/null \
            | sort -V | tail -1)
          echo "Using android.jar: $ANDROID_JAR"

          # extension/*.java    — GOG/Epic/Amazon (needs org-json.jar)
          # extension/steam/*.java — SteamRepository + SteamDepotDownloader (needs javasteam.jar + protobuf-java.jar)
          # Both sets share android.jar.
          mkdir -p ext_java_classes
          javac -source 8 -target 8 \
            -cp "$ANDROID_JAR:org-json.jar:javasteam.jar:protobuf-java.jar:zxing-core.jar:commons-lang3.jar" \
            -d ext_java_classes \
            extension/*.java extension/steam/*.java
          echo "Compiled $(find ext_java_classes -name '*.class' | wc -l) Java class files"

          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          mkdir -p ext_java_dex
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/d8 \
            --release --min-api 26 --output ext_java_dex \
            $(find ext_java_classes -name "*.class") \
            zxing-core.jar \
            commons-lang3.jar \
            protobuf-java.jar
          ls -lh ext_java_dex/classes.dex
          echo "classes17.dex ready: $(du -sh ext_java_dex/classes.dex | cut -f1)"

      - name: Bundle JavaSteam → classes18.dex
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          mkdir -p ext_steam_lib_dex
          echo "Running d8 on JavaSteam JAR..."
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/d8 \
            --release --min-api 26 --output ext_steam_lib_dex \
            javasteam.jar
          # d8 may produce multiple DEX files if the JAR is large
          echo "JavaSteam DEX output:"
          ls -lh ext_steam_lib_dex/

      - name: Compile Kotlin Steam extension → classes.dex (for classes19+)
        run: |
          ANDROID_JAR=$(ls $ANDROID_SDK_ROOT/platforms/android-*/android.jar 2>/dev/null \
            | sort -V | tail -1)
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)

          # Strip Kotlin module metadata from javasteam.jar so kotlinc 1.9.x doesn't error
          # on "metadata version 2.2.0, expected 1.9.0". The .class files still work fine
          # as Java bytecode; only the Kotlin metadata is removed.
          zip -d javasteam.jar 'META-INF/*.kotlin_module' 2>/dev/null || true

          mkdir -p ext_kotlin_classes
          KT_FILES=$(find extension/steam -name "*.kt" | sort)
          echo "Compiling Kotlin files:"
          echo "$KT_FILES"

          # -no-stdlib: don't auto-include stdlib in the output (it's already in the base APK).
          # But we still need it on the COMPILATION classpath so built-in types resolve.
          # kotlin-stdlib.jar lives in $HOME/kotlinc/lib/ from the unzipped compiler distribution.
          # ext_java_classes: SteamRepository.java was compiled in the Java step — Kotlin files
          # reference SteamRepository so it must be on the Kotlin classpath.
          KOTLIN_STDLIB="$HOME/kotlinc/lib/kotlin-stdlib.jar"
          kotlinc \
            -no-stdlib \
            -classpath "$ANDROID_JAR:javasteam.jar:$KOTLIN_STDLIB:ext_java_classes:zxing-core.jar" \
            -d ext_kotlin_classes \
            $KT_FILES
          echo "Kotlin compilation done: $(find ext_kotlin_classes -name '*.class' | wc -l) class files"

          mkdir -p ext_kotlin_dex
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/d8 \
            --release --min-api 26 --output ext_kotlin_dex \
            $(find ext_kotlin_classes -name "*.class")
          echo "Kotlin DEX output:"
          ls -lh ext_kotlin_dex/

      - name: Build modified APK with apktool
        run: |
          java -jar $HOME/bin/apktool.jar b apktool_out_base \
            --use-aapt1 \
            -o rebuilt-unsigned.apk
          ls -lh rebuilt-unsigned.apk

      - name: Re-inject original ab_*.png and animated XMLs from base APK
        run: |
          BASE_APK=$(ls base/*.apk | head -1)
          mkdir -p ab_reinject
          unzip -q "$BASE_APK" \
            'res/drawable/ab_*.png' \
            'res/drawable/animated_background.xml' \
            'res/drawable/animated_gear_background.xml' \
            -d ab_reinject 2>/dev/null || true
          INJECTED=$(find ab_reinject -type f | wc -l)
          echo "Re-injecting $INJECTED files from $BASE_APK"
          if [ "$INJECTED" -gt 0 ]; then
            (cd ab_reinject && zip -r ../rebuilt-unsigned.apk res/)
            echo "Done. ab_/animated entries in APK:"
            unzip -l rebuilt-unsigned.apk | grep 'res/drawable/ab_\|animated_background\|animated_gear' | wc -l
          fi

      - name: Inject classes17.dex (Java stores — GOG/Epic/Amazon)
        run: |
          cp ext_java_dex/classes.dex classes17.dex
          zip -j rebuilt-unsigned.apk classes17.dex
          echo "classes17.dex injected ($(du -sh classes17.dex | cut -f1))"

      - name: Inject classes18.dex+ (JavaSteam library)
        run: |
          # d8 may have split JavaSteam into multiple DEX files
          DEX_IDX=18
          for dex_file in $(ls ext_steam_lib_dex/classes*.dex | sort); do
            TARGET_NAME="classes${DEX_IDX}.dex"
            cp "$dex_file" "$TARGET_NAME"
            zip -j rebuilt-unsigned.apk "$TARGET_NAME"
            echo "${TARGET_NAME} injected ($(du -sh "$TARGET_NAME" | cut -f1))"
            DEX_IDX=$((DEX_IDX + 1))
          done
          echo "Next available DEX index: $DEX_IDX"
          echo "NEXT_DEX_IDX=$DEX_IDX" >> $GITHUB_ENV

      - name: Inject Kotlin Steam extension DEX
        run: |
          DEX_IDX=${{ env.NEXT_DEX_IDX }}
          for dex_file in $(ls ext_kotlin_dex/classes*.dex | sort); do
            TARGET_NAME="classes${DEX_IDX}.dex"
            cp "$dex_file" "$TARGET_NAME"
            zip -j rebuilt-unsigned.apk "$TARGET_NAME"
            echo "${TARGET_NAME} injected ($(du -sh "$TARGET_NAME" | cut -f1))"
            DEX_IDX=$((DEX_IDX + 1))
          done

      - name: Zipalign
        run: |
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/zipalign \
            -f -v 4 rebuilt-unsigned.apk rebuilt-aligned.apk

      - name: Sign APK
        id: sign
        run: |
          APK_NAME="LudashiPlus-${GITHUB_REF_NAME}.apk"
          BUILD_TOOLS=$(ls $ANDROID_SDK_ROOT/build-tools | sort -V | tail -1)
          $ANDROID_SDK_ROOT/build-tools/$BUILD_TOOLS/apksigner sign \
            --key testkey.pk8 \
            --cert testkey.x509.pem \
            --v1-signing-enabled true \
            --v2-signing-enabled true \
            --v3-signing-enabled true \
            --out "$APK_NAME" \
            rebuilt-aligned.apk
          echo "Signed: $APK_NAME ($(du -sh "$APK_NAME" | cut -f1))"
          echo "apk_name=$APK_NAME" >> "$GITHUB_OUTPUT"

      - name: Create or update GitHub release
        run: |
          APK_NAME="${{ steps.sign.outputs.apk_name }}"
          TAG="${GITHUB_REF_NAME}"

          if gh release view "$TAG" &>/dev/null; then
            gh release upload "$TAG" "$APK_NAME" --clobber
            echo "Uploaded to existing release $TAG"
          else
            gh release create "$TAG" "$APK_NAME" \
              --title "Ludashi-plus $TAG" \
              --notes "Automated build — see PROGRESS_LOG.md for details." \
              --prerelease
            echo "Created new release $TAG with $APK_NAME"
          fi
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
